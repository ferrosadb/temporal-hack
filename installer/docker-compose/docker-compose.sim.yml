# Sim overlay: brings up one virtual robot — Gazebo + TurtleBot3 +
# the bridge node — and an agent container that consumes the bridge's
# gRPC stream and reports telemetry to the lab MQTT broker.
#
# Composed on top of docker-compose.yml under the same project name,
# so the sim and lab containers share a network and the agent can
# reach the broker at `mqtt:1883` (container-internal port — never
# the host-side port mapping).
#
# Use:  make sim-up   (lab cluster + sim + agent)
#       make sim-down
#       make sim-logs
services:
  sim:
    build:
      # Build context is the repo root so the bridge/ tree can be COPY'd.
      context: ../..
      dockerfile: docker/sim/Dockerfile
    image: temporal-hack/sim:dev
    environment:
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: 42
      HEADLESS: "1"
      BRIDGE_SOCKET: /run/bridge/temporal-hack-bridge.sock
    volumes:
      - bridge-sock:/run/bridge

  agent:
    image: golang:1.22-bookworm
    depends_on:
      mqtt:
        condition: service_healthy
      sim:
        condition: service_started
    working_dir: /src/agent
    environment:
      ROBOT_ID: sim-robot-01
      # mqtt and sim are sibling services on the same Compose network;
      # the agent uses the canonical container-internal ports.
      BROKER_URL: tcp://mqtt:1883
      BUFFER_PATH: /var/lib/agent/buffer.db
      BRIDGE_ADDR: unix:///run/bridge/temporal-hack-bridge.sock
    volumes:
      - ../..:/src:ro
      - bridge-sock:/run/bridge
      - agent-data:/var/lib/agent
      # Agent needs the container-runtime socket on the host to
      # perform OTA. CONTAINER_SOCK is supplied by the Makefile at
      # compose time (resolves to docker.sock or podman.sock).
      - ${CONTAINER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    # apt is needed to install the C toolchain for go-sqlite3 (cgo).
    command: >
      bash -c "
        apt-get update -qq && apt-get install -y -qq build-essential >/dev/null &&
        cd /src/agent &&
        CGO_ENABLED=1 go run ./cmd/agent
      "

volumes:
  bridge-sock:
  agent-data:
