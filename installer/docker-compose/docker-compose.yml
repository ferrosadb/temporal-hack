# Lab bring-up of the platform stack. Satisfies S0 acceptance:
# "installer reproducibly brings up Postgres + Temporal + MQTT broker
# + registry on a 3-node lab cluster."
#
# This file targets a single Docker host. The Helm chart in
# ../helm/ is the production multi-node target. Both are
# generated from the same parameter set; the installer owns the
# divergence.
#
# Bring up:    docker compose up -d
# Tear down:   docker compose down
# Wipe state:  docker compose down -v
services:
  postgres:
    # TimescaleDB-HA image. Stock postgres:15-alpine does not ship the
    # timescaledb extension, so init-telemetry.sql's CREATE EXTENSION
    # call would fail (IF NOT EXISTS only checks installation state,
    # not availability). Closes specs/todo/timescaledb-image-swap.md.
    image: timescale/timescaledb-ha:pg15
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: telemetry
    ports:
      # Default 14432 (not 5432). The full lab port set is in the
      # 14xxx range to avoid colliding with common local services
      # (Postgres on 5432, ferrosa-memory on 18080, Temporal on
      # 7233, etc.). Override with POSTGRES_PORT.
      - "${POSTGRES_PORT:-14432}:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ../../deploy/postgres/init-temporal.sql:/docker-entrypoint-initdb.d/01-temporal.sql:ro
      - ../../deploy/postgres/init-telemetry.sql:/docker-entrypoint-initdb.d/02-telemetry.sql:ro
      - ../../deploy/postgres/init-ota.sql:/docker-entrypoint-initdb.d/03-ota.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d telemetry"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.24.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig.yaml
    ports:
      - "${TEMPORAL_PORT:-14733}:7233"
    volumes:
      - ../../deploy/temporal/dynamicconfig.yaml:/etc/temporal/config/dynamicconfig.yaml:ro

  temporal-ui:
    image: temporalio/ui:2.27.2
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:${TEMPORAL_UI_PORT:-14080}
    ports:
      - "${TEMPORAL_UI_PORT:-14080}:8080"

  mqtt:
    # EMQX 5.x defaults: anonymous auth, listener on 1883, dashboard on
    # 18083 — exactly the v1 lab posture. We do NOT mount a custom
    # emqx.conf for the lab because the file format is volatile across
    # 5.x point releases (e.g. session_persistence vs durable_sessions).
    # See deploy/mqtt/emqx.conf.example for the production-target
    # config reference; production installer renders it through a
    # version-pinned schema check.
    image: emqx/emqx:5.7.1
    ports:
      - "${MQTT_PORT:-14883}:1883"               # MQTT
      - "${MQTT_DASHBOARD_PORT:-14093}:18083"    # dashboard
    volumes:
      - mqttdata:/opt/emqx/data
    healthcheck:
      # `emqx ctl status` is the documented EMQX 5.x liveness check.
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  registry:
    image: registry:2
    ports:
      # 5000 collides with macOS AirPlay Receiver. 14050 keeps the
      # lab registry inside the 14xxx range with the rest of the lab
      # stack. Override with REGISTRY_PORT.
      - "${REGISTRY_PORT:-14050}:5000"
    volumes:
      - registrydata:/var/lib/registry

volumes:
  pgdata:
  mqttdata:
  registrydata:
