name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: go ${{ matrix.module }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        module: [cloud, agent]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  installer-smoke:
    name: lab stack smoke
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f installer/docker-compose/docker-compose.yml up -d --wait
        timeout-minutes: 6
      - name: probe ports
        run: |
          for port in 5432 7233 1883 5000; do
            for i in $(seq 1 30); do
              nc -z localhost "$port" && break
              sleep 2
            done
            nc -z localhost "$port" || { echo "port $port never came up"; exit 1; }
          done
      - run: docker compose -f installer/docker-compose/docker-compose.yml down -v
        if: always()

  python-lint:
    name: bridge lint
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install ruff
      - run: ruff check bridge_node
