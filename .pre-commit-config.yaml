# =============================================================================
# temporal-hack - Pre-commit Configuration
# =============================================================================
# Auto-generated by /op-init (manage-precommit skill)
# Detected projects: rust (root)
# =============================================================================

default_install_hook_types:
  - pre-commit
  - pre-push
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-byte-order-marker
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: no-commit-to-branch
        args:
          - --pattern
          - '^(?!((ci|chore|docs|feature|fix|refactor|test)\/[a-zA-Z0-9\-]+)$).*'
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--exclude-files", ".*\\.ipynb", "--exclude-files", ".*\\.lock"]

  # ===========================================================================
  # Go: cloud module — pre-commit
  # Mirrors .github/workflows/ci.yml `go` job for the cloud module.
  # ===========================================================================
  - repo: local
    hooks:
      - id: go-fmt-cloud
        name: go fmt (cloud)
        entry: bash -c 'cd cloud && test -z "$(gofmt -l .)" || { gofmt -d .; exit 1; }'
        language: system
        files: ^cloud/.*\.go$
        pass_filenames: false

      - id: go-vet-cloud
        name: go vet (cloud)
        entry: bash -c 'cd cloud && go vet ./...'
        language: system
        files: ^cloud/.*\.go$
        pass_filenames: false

      - id: go-mod-tidy-cloud
        name: go mod tidy verify (cloud)
        entry: bash -c 'cd cloud && cp go.mod go.mod.bak && cp go.sum go.sum.bak 2>/dev/null || true; go mod tidy; r=0; diff -q go.mod go.mod.bak >/dev/null
          || r=1; diff -q go.sum go.sum.bak >/dev/null || r=1; mv go.mod.bak go.mod; mv go.sum.bak go.sum 2>/dev/null || true; [ $r -eq 0 ] || { echo "go
          mod tidy would change go.mod/go.sum in cloud"; exit 1; }'
        language: system
        files: ^cloud/(go\.mod|go\.sum|.*\.go)$
        pass_filenames: false

      # ========================================================================
      # Go: agent module — pre-commit
      # Mirrors .github/workflows/ci.yml `go` job for the agent module.
      # ========================================================================
      - id: go-fmt-agent
        name: go fmt (agent)
        entry: bash -c 'cd agent && test -z "$(gofmt -l .)" || { gofmt -d .; exit 1; }'
        language: system
        files: ^agent/.*\.go$
        pass_filenames: false

      - id: go-vet-agent
        name: go vet (agent)
        entry: bash -c 'cd agent && go vet ./...'
        language: system
        files: ^agent/.*\.go$
        pass_filenames: false

      - id: go-mod-tidy-agent
        name: go mod tidy verify (agent)
        entry: bash -c 'cd agent && cp go.mod go.mod.bak && cp go.sum go.sum.bak 2>/dev/null || true; go mod tidy; r=0; diff -q go.mod go.mod.bak >/dev/null
          || r=1; diff -q go.sum go.sum.bak >/dev/null || r=1; mv go.mod.bak go.mod; mv go.sum.bak go.sum 2>/dev/null || true; [ $r -eq 0 ] || { echo "go
          mod tidy would change go.mod/go.sum in agent"; exit 1; }'
        language: system
        files: ^agent/(go\.mod|go\.sum|.*\.go)$
        pass_filenames: false

      # ========================================================================
      # Python: bridge — pre-commit
      # Mirrors .github/workflows/ci.yml `python-lint` job.
      # ========================================================================
      - id: ruff-bridge
        name: ruff (bridge)
        entry: bash -c 'cd bridge && command -v ruff >/dev/null || pip install --quiet ruff; ruff check bridge_node'
        language: system
        files: ^bridge/.*\.py$
        pass_filenames: false

      # ========================================================================
      # Pre-push: matches CI go test step.
      # CGO is required because agent uses go-sqlite3.
      # ========================================================================
      - id: go-test-cloud
        name: go test -race (cloud)
        stages: [pre-push]
        entry: bash -c 'cd cloud && go test -race -count=1 ./...'
        language: system
        files: ^cloud/.*\.go$
        pass_filenames: false

      - id: go-test-agent
        name: go test -race (agent)
        stages: [pre-push]
        entry: bash -c 'cd agent && CGO_ENABLED=1 go test -race -count=1 ./...'
        language: system
        files: ^agent/.*\.go$
        pass_filenames: false

      # ========================================================================
      # Pre-push: installer smoke test — mirrors CI `installer-smoke` job.
      # Slow (~5–6 min) and requires docker/podman + free ports. Skip with:
      #   SKIP=installer-smoke git push
      # ========================================================================
      - id: installer-smoke
        name: installer smoke (lab stack up + ports probe)
        stages: [pre-push]
        entry: bash -c '.git-hooks/installer-smoke.sh'
        language: system
        files: ^(installer/|deploy/|\.github/workflows/ci\.yml).*$
        pass_filenames: false

  # ===========================================================================
  # Codespell (typo detection)
  # ===========================================================================
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        exclude: '(node_modules/|package-lock\.json|\.lock$)'

  # ===========================================================================
  # YAML formatting
  # ===========================================================================
  - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    rev: 0.2.3
    hooks:
      - id: yamlfmt
        args:
          - --mapping=2
          - --sequence=4
          - --offset=2
          - --implicit_start
          - --preserve-quotes
        exclude: '(templates/.*\.yaml$|\.github/workflows/.*\.yaml$)'

  # ===========================================================================
  # Shell scripts
  # ===========================================================================
  - repo: https://github.com/pecigonzalo/pre-commit-shfmt
    rev: v2.2.0
    hooks:
      - id: shell-fmt-docker
        name: shfmt
        args:
          - --indent=2
          - --binary-next-line
          - --case-indent
          - --space-redirects
        files: \.sh$

  # ===========================================================================
  # Commit message convention
  # ===========================================================================
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
