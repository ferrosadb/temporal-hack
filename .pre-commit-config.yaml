# =============================================================================
# temporal-hack - Pre-commit Configuration
# =============================================================================
# Auto-generated by /op-init (manage-precommit skill)
# Detected projects: rust (root)
# =============================================================================

default_install_hook_types:
  - pre-commit
  - pre-push
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-byte-order-marker
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: no-commit-to-branch
        args:
          - --pattern
          - '^(?!((ci|chore|docs|feature|fix|refactor|test)\/[a-zA-Z0-9\-]+)$).*'
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--exclude-files", ".*\\.ipynb", "--exclude-files", ".*\\.lock"]

  # ===========================================================================
  # Rust: temporal-hack
  # ===========================================================================
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cargo fmt -- --check'
        language: system
        files: \.rs$
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'cargo clippy -- -D warnings'
        language: system
        files: \.rs$
        pass_filenames: false

      # Security: fast offline advisory + license policy check on every commit
      - id: cargo-deny
        name: cargo deny
        entry: bash -c 'cargo deny check advisories licenses'
        language: system
        files: ^Cargo\.(toml|lock)$
        pass_filenames: false

      # Security: full advisory database scan on push (requires network)
      - id: cargo-audit
        name: cargo audit
        stages: [pre-push]
        entry: bash -c 'cargo audit --deny warnings'
        language: system
        files: ^Cargo\.(toml|lock)$
        pass_filenames: false

      # Pre-push: Tests
      - id: cargo-test
        name: cargo test
        stages: [pre-push]
        entry: bash -c 'cargo test --all'
        language: system
        files: \.rs$
        pass_filenames: false

  # ===========================================================================
  # Codespell (typo detection)
  # ===========================================================================
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        exclude: '(node_modules/|package-lock\.json|\.lock$)'

  # ===========================================================================
  # YAML formatting
  # ===========================================================================
  - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    rev: 0.2.3
    hooks:
      - id: yamlfmt
        args:
          - --mapping=2
          - --sequence=4
          - --offset=2
          - --implicit_start
          - --preserve-quotes
        exclude: '(templates/.*\.yaml$|\.github/workflows/.*\.yaml$)'

  # ===========================================================================
  # Shell scripts
  # ===========================================================================
  - repo: https://github.com/pecigonzalo/pre-commit-shfmt
    rev: v2.2.0
    hooks:
      - id: shell-fmt-docker
        name: shfmt
        args:
          - --indent=2
          - --binary-next-line
          - --case-indent
          - --space-redirects
        files: \.sh$

  # ===========================================================================
  # Commit message convention
  # ===========================================================================
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
